apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: external-dns-cloudflare
  namespace: kube-system
spec:
  chartRef:
    kind: OCIRepository
    name: external-dns
    namespace: flux-system
  interval: 15m
  install:
    createNamespace: true
  values:
    provider:
      name: rfc2136
    fullnameOverride: external-dns
    policy: sync
    registry: txt
    txtOwnerId: k8s
    txtPrefix: external-dns-
    sources:
      - service
      - crd
      - gateway-httproute
    extraArgs:
    - "--rfc2136-host=192.168.1.10"
    - "--rfc2136-port=53"
    - "--rfc2136-zone=malef.lan"
    - "--rfc2136-tsig-secret=SP0tjHmNb+HdGHsQWHftCt4EQ7lMLxfIHZu1W4jhhx8="
    - "--rfc2136-tsig-secret-alg=hmac-sha256"
    - "--rfc2136-tsig-keyname=tsig-key"
    - "--rfc2136-tsig-axfr"

    logLevel: info
        
    metrics:
      enabled: true
      port: 7979
        
        # Service monitor for Prometheus
    serviceMonitor:
      enabled: true