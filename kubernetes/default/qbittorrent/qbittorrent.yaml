---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: qbittorrent
  namespace: default
spec:
  chartRef:
    kind: OCIRepository
    name: app-template
    namespace: flux-system
  interval: 1h
  values:
    defaultPodOptions:
      securityContext:
        fsGroup: 1001
        fsGroupChangePolicy: OnRootMismatch
        runAsGroup: 1001
        runAsNonRoot: true
        runAsUser: 1001

    controllers:
      qbittorrent:
        containers:
          app:
            image:
              repository: ghcr.io/home-operations/qbittorrent
              tag: 5.1.4@sha256:bb82ad6668f8eda1d0fcce6c1341498bfa879155bb1295cd9d314a2c35c07a01
            env:
              TZ: Europe/Moscow
              QBT_WEBUI_PORT: &port 80
              QBT_TORRENTING_PORT: &torrentPort 50413
            probes:
              liveness:
                enabled: true
              readiness:
                enabled: true
              startup:
                enabled: true
                spec:
                  failureThreshold: 30
                  periodSeconds: 5
            resources:
              requests:
                cpu: 10m
                memory: 250Mi
              limits:
                memory: 2Gi
            securityContext:
              allowPrivilegeEscalation: false
              capabilities: {drop: ["ALL"]}
              readOnlyRootFilesystem: true

    persistence:
      config:
        existingClaim: qbittorrent-config
      media:
        type: hostPath
        hostPath: 
          path: /home/malef/media
          type: Directory
        globalMounts:
          - path: /media
      tmp:
        type: emptyDir
      incomplete:
        enabled: true
        type: emptyDir

    route:
      main:
        enabled: true
        parentRefs:
          - name: envoy-internal
            namespace: kube-system
            sectionName: https
        hostnames:
          - qb.malef.lan
        rules:
          - matches:
              - path:
                  type: PathPrefix
                  value: /
            backendRefs:
              - name: qbittorrent
                port: 80

    service:
      app:
        controller: qbittorrent
        ports:
          http:
            port: *port
            primary: true
          bittorrent:
            enabled: true
            port: *torrentPort
            protocol: TCP