---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: cert-manager
  namespace: cert-manager
spec:
  chartRef:
    kind: OCIRepository
    name: cert-manager
  interval: 1h
  values:
    crds:
      enabled: true
    prometheus:
      enabled: true
      servicemonitor:
        enabled: true
    resources:
      requests:
        cpu: 15m
        memory: 200M
      limits:
        memory: 300M
    webhook:
      replicaCount: 1
      podDisruptionBudget:
        enabled: true
      resources:
        requests:
          cpu: 15m
          memory: 32M
        limits:
          memory: 32M
    cainjector:
      resources:
        requests:
          cpu: 15m
          memory: 200M
        limits:
          memory: 400M
    