helmDefaults:
  cleanupOnFail: true
  wait: true
  waitForJobs: true
  timeout: 600
  force: false

releases:
  - name: cilium
    namespace: kube-system
    chart: oci://quay.io/cilium/charts/cilium
    version: 1.19.3
    values:
      - ../templates/cilium-values.yaml
    
  - name: cert-manager
    namespace: cert-manager
    chart: oci://quay.io/jetstack/charts/cert-manager
    version: v1.20.2
    values:
      - ../templates/cert-manager-values.yaml
    needs:
      - kube-system/cilium

  - name: flux-operator
    namespace: flux-system
    chart: oci://ghcr.io/controlplaneio-fluxcd/charts/flux-operator
    version: 0.48.0
    values:
      - ../templates/flux-operator-values.yaml
    needs:
      - kube-system/cilium

  - name: flux-instance
    namespace: flux-system
    chart: oci://ghcr.io/controlplaneio-fluxcd/charts/flux-instance
    version: 0.48.0
    wait: false
    values:
      - ../templates/flux-instance-values.yaml
    needs:
      - flux-system/flux-operator